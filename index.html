<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Змейка</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
user-select:none;
-webkit-tap-highlight-color:transparent;
}

body{
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:linear-gradient(135deg,#0f172a,#134e4a);
}

body.light-theme{
background:linear-gradient(135deg,#d1fae5,#ecfeff);
}

.game-container{
width:100%;
max-width:720px;
padding:16px;
border-radius:24px;
backdrop-filter:blur(14px);
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
box-shadow:0 20px 40px rgba(0,0,0,0.25);
position:relative;
}

body.light-theme .game-container{
background:rgba(255,255,255,0.7);
}

h1{
color:#fbbf24;
font-size:22px;
}

.stats-compact{
display:flex;
gap:12px;
color:white;
font-weight:600;
}

.canvas-wrapper{
margin-top:10px;
padding:10px;
border-radius:18px;
background:rgba(0,0,0,0.15);
display:flex;
justify-content:center;
}

canvas{
border-radius:12px;
}

button{
border:none;
cursor:pointer;
border-radius:14px;
padding:10px 14px;
background:#22c55e;
color:white;
font-weight:600;
transition:.2s;
}

button:hover{
transform:scale(1.05);
}

.controls{
display:flex;
gap:8px;
justify-content:center;
margin-top:10px;
flex-wrap:wrap;
}

.level-btn.active{
background:#f59e0b;
}

.level-btn.locked{
opacity:.4;
pointer-events:none;
}

.settings-gear,
.theme-toggle,
.mode-toggle,
#leaderboardBtn{
position:absolute;
top:12px;
width:38px;
height:38px;
display:flex;
justify-content:center;
align-items:center;
border-radius:50%;
background:rgba(255,255,255,0.15);
color:white;
cursor:pointer;
}

.settings-gear{right:10px;}
.theme-toggle{right:55px;}
.mode-toggle{right:100px;}
#leaderboardBtn{right:145px;}

.settings-panel{
position:absolute;
top:60px;
right:10px;
background:rgba(0,0,0,0.7);
padding:14px;
border-radius:14px;
color:white;
display:none;
}

.settings-panel.show{display:block;}

</style>
</head>

<body class="dark-theme">

<div class="game-container">

<div class="mode-toggle" id="modeToggle">🎮</div>
<div class="theme-toggle" id="themeToggle">🌓</div>
<div class="settings-gear" id="settingsGear">⚙️</div>
<div id="leaderboardBtn">🏆</div>

<h1>snake</h1>

<div class="stats-compact">
<div>🍎 <span id="applesCollected">0</span></div>
<div>📏 <span id="length">1</span></div>
</div>

<div class="canvas-wrapper">
<canvas id="gameCanvas" width="390" height="390"></canvas>
</div>

<div class="controls">
<button id="startBtn">start</button>
<button id="pauseBtn">pause</button>
<button id="resetBtn">reset</button>
</div>

<div class="settings-panel" id="settingsPanel">
speed<br>
<input id="speedSlider" type="range" min="100" max="400">
</div>

</div>

<script>
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");

let snake=[{x:200,y:200}];
let dx=20,dy=0;
let food={x:100,y:100};
let running=false;

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="red";
ctx.fillRect(food.x,food.y,20,20);

ctx.fillStyle="lime";
snake.forEach(s=>ctx.fillRect(s.x,s.y,20,20));
}

function step(){
if(!running)return;

let head={x:snake[0].x+dx,y:snake[0].y+dy};
snake.unshift(head);

if(head.x===food.x&&head.y===food.y){
food.x=Math.floor(Math.random()*19)*20;
food.y=Math.floor(Math.random()*19)*20;
}else{
snake.pop();
}

draw();
}

setInterval(step,120);

document.addEventListener("keydown",e=>{
if(e.key==="ArrowUp")dx=0,dy=-20;
if(e.key==="ArrowDown")dx=0,dy=20;
if(e.key==="ArrowLeft")dx=-20,dy=0;
if(e.key==="ArrowRight")dx=20,dy=0;
});

document.getElementById("startBtn").onclick=()=>running=true;
document.getElementById("pauseBtn").onclick=()=>running=false;
document.getElementById("resetBtn").onclick=()=>{snake=[{x:200,y:200}];};

draw();
</script>

</body>
</html>
